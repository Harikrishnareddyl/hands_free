name: HandsFree

options:
  bundleIdPrefix: com.lakkireddylabs
  createIntermediateGroups: true
  deploymentTarget:
    macOS: "13.0"

settings:
  base:
    SWIFT_VERSION: "5"
    MACOSX_DEPLOYMENT_TARGET: "13.0"
    CODE_SIGN_STYLE: Manual
    CODE_SIGN_IDENTITY: "HandsFree Dev"
    CODE_SIGN_INJECT_BASE_ENTITLEMENTS: NO
    ENABLE_HARDENED_RUNTIME: YES
    DEAD_CODE_STRIPPING: YES
    OTHER_CODE_SIGN_FLAGS: "--timestamp=none"
    DEVELOPMENT_TEAM: ""
    PROVISIONING_PROFILE_SPECIFIER: ""
    # Xcode 15+ splits debug builds into a stub + HandsFree.debug.dylib; the two
    # must share a Team ID which self-signed certs don't provide. Fold it back
    # into a single binary for Debug builds.
    ENABLE_DEBUG_DYLIB: NO
    SWIFT_ENABLE_OPAQUE_TYPE_ERASURE: NO

packages:
  KeyboardShortcuts:
    url: https://github.com/sindresorhus/KeyboardShortcuts
    from: 2.2.0
  GRDB:
    url: https://github.com/groue/GRDB.swift
    from: 6.29.0
  MarkdownUI:
    url: https://github.com/gonzalezreal/swift-markdown-ui
    from: 2.4.1

targets:
  HandsFree:
    type: application
    platform: macOS
    deploymentTarget: "13.0"
    sources:
      - path: HandsFree
    info:
      path: HandsFree/Generated-Info.plist
      properties:
        LSUIElement: true
        CFBundleShortVersionString: "0.1.9"
        CFBundleVersion: "9"
        CFBundleIconFile: "AppIcon"
        NSMicrophoneUsageDescription: "Hands-Free captures your voice while you hold the dictation hotkey and sends it to Groq for transcription."
        NSAppleEventsUsageDescription: "Hands-Free synthesizes a paste keystroke to insert transcribed text into the focused field."
    entitlements:
      path: HandsFree/HandsFree.entitlements
      properties:
        com.apple.security.device.audio-input: true
    dependencies:
      - package: KeyboardShortcuts
      - package: GRDB
      - package: MarkdownUI
        product: MarkdownUI
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.lakkireddylabs.HandsFree
        PRODUCT_NAME: HandsFree
        GENERATE_INFOPLIST_FILE: NO
